<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>cc-bridge</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #17212b);
    --sec: var(--tg-theme-secondary-bg-color, #232e3c);
    --text: var(--tg-theme-text-color, #f5f5f5);
    --hint: var(--tg-theme-hint-color, #7d8b99);
    --link: var(--tg-theme-link-color, #6ab3f3);
    --btn: var(--tg-theme-button-color, #5288c1);
    --btn-text: var(--tg-theme-button-text-color, #fff);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.4 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  /* Form controls don't inherit fonts by default (the composer was silently falling back to the
     UA's monospace); give them the app stack — later per-element rules (#vedit-area) still win. */
  input, button, select, textarea { font: inherit; }
  header { position: sticky; top: 0; background: var(--bg); padding: 10px 12px; border-bottom: 1px solid var(--sec); }
  .crumbs { font-size: 13px; color: var(--hint); word-break: break-all; margin-bottom: 8px; }
  .crumbs a { color: var(--link); text-decoration: none; }
  .search { display: flex; gap: 6px; }
  .search input { flex: 1; padding: 8px 10px; border-radius: 8px; border: none; background: var(--sec); color: var(--text); font-size: 14px; }
  .search button { padding: 8px 12px; border: none; border-radius: 8px; background: var(--btn); color: var(--btn-text); }
  ul { list-style: none; margin: 0; padding: 0; }
  li { padding: 11px 12px; border-bottom: 1px solid var(--sec); display: flex; gap: 10px; align-items: center; cursor: pointer; }
  li:active { background: var(--sec); }
  .ico { width: 20px; text-align: center; }
  .name { flex: 1; word-break: break-all; }
  .meta { color: var(--hint); font-size: 12px; white-space: nowrap; }
  #viewer { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; }
  #viewer.show { display: flex; }
  .vhead { padding: 10px 12px; border-bottom: 1px solid var(--sec); display: flex; gap: 8px; align-items: center; }
  .vhead .name { font-size: 14px; }
  .vhead button { padding: 7px 11px; border: none; border-radius: 8px; background: var(--btn); color: var(--btn-text); }
  pre { margin: 0; padding: 12px; overflow: auto; flex: 1; white-space: pre; font: 13px/1.45 ui-monospace, Menlo, Consolas, monospace; }
  .notice { padding: 24px 16px; color: var(--hint); text-align: center; }
  .err { background: #c0392b; color: #fff; padding: 8px 12px; font-size: 13px; display: none; }
  .err.show { display: block; }
  .err.ok { background: #2e7d32; }
  button.rowbtn { background: transparent; border: none; color: var(--hint); font-size: 18px; line-height: 1; padding: 2px 8px; cursor: pointer; }
  textarea#vedit-area { margin: 0; padding: 12px; border: none; outline: none; flex: 1; width: 100%; resize: none; background: var(--bg); color: var(--text); font: 13px/1.45 ui-monospace, Menlo, Consolas, monospace; }
  /* Tab bar */
  .tabs { display: flex; position: sticky; top: 0; z-index: 2; background: var(--bg); border-bottom: 1px solid var(--sec); }
  .tabs button { flex: 1; padding: 11px 4px; border: none; background: transparent; color: var(--hint); font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--btn); }
  .tab { display: none; }
  .tab.show { display: block; }
  /* Console (Settings / Usage / Diff) */
  .panel { padding: 12px; }
  .card { background: var(--sec); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .card .k { color: var(--hint); font-size: 12px; }
  .card .v { font-size: 16px; margin-top: 2px; word-break: break-word; }
  .setrow { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--sec); }
  .setrow:last-child { border-bottom: none; }
  .setrow .lbl { flex: 1; }
  .setrow .lbl .sub { color: var(--hint); font-size: 12px; }
  .setrow .ro { color: var(--hint); font-size: 13px; }
  .toggle { padding: 6px 12px; border: none; border-radius: 8px; background: var(--btn); color: var(--btn-text); font-size: 13px; cursor: pointer; min-width: 56px; }
  .toggle.off { background: var(--sec); color: var(--hint); box-shadow: inset 0 0 0 1px var(--hint); }
  select.seg { padding: 6px 8px; border-radius: 8px; border: none; background: var(--bg); color: var(--text); font-size: 13px; box-shadow: inset 0 0 0 1px var(--sec); }
  .bar { height: 8px; border-radius: 4px; background: var(--bg); overflow: hidden; margin-top: 6px; box-shadow: inset 0 0 0 1px var(--sec); }
  .bar > span { display: block; height: 100%; background: var(--btn); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  /* Sessions dashboard */
  .sess { background: var(--sec); border-radius: 12px; padding: 12px 14px; margin: 0 0 10px; cursor: pointer; }
  .sess:active { filter: brightness(1.1); }
  .sess .top { display: flex; align-items: center; gap: 8px; }
  .sess .nm { font-weight: 600; flex: 1; word-break: break-word; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--hint); flex: none; }
  .dot.on { background: #4caf50; animation: pulse 1.6s ease-in-out infinite; }
  .dot.dead { background: #e05555; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  .chip { font-size: 11px; color: var(--hint); background: var(--bg); border-radius: 6px; padding: 2px 7px; white-space: nowrap; }
  .sess .task { color: var(--hint); font-size: 13px; margin-top: 6px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-word; }
  .sess .foot { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--hint); }
  .sess .foot .bar { flex: 1; margin-top: 0; height: 5px; }
  /* Drill-in (session detail) */
  #drill { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 5; }
  #drill.show { display: flex; }
  #dfeed { flex: 1; overflow-y: auto; padding: 12px; }
  .msg { max-width: 88%; margin-bottom: 8px; padding: 8px 11px; border-radius: 12px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: var(--btn); color: var(--btn-text); margin-left: auto; border-bottom-right-radius: 4px; }
  .msg.user.pending { opacity: .55; }
  .msg.assistant { background: var(--sec); border-bottom-left-radius: 4px; }
  .msg.activity { background: transparent; color: var(--hint); font: italic 12px/1.4 ui-monospace, monospace; padding: 2px 11px; margin-bottom: 3px; }
  .composer { display: flex; gap: 6px; padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); border-top: 1px solid var(--sec); }
  .composer textarea { flex: 1; resize: none; border: none; border-radius: 10px; background: var(--sec); color: var(--text); padding: 9px 11px; font-size: 14px; line-height: 1.35; max-height: 110px; }
  .composer button { border: none; border-radius: 10px; background: var(--btn); color: var(--btn-text); padding: 0 14px; font-size: 15px; }
  .iconbtn { background: var(--sec); border: none; border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 14px; }
  /* Bus + automation boards */
  .buschips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .evrow { display: flex; gap: 8px; padding: 8px 2px; border-bottom: 1px solid var(--sec); font-size: 13px; align-items: baseline; }
  .evrow .who { color: var(--link); white-space: nowrap; }
  .evrow .tx { color: var(--hint); flex: 1; word-break: break-word; }
  .xbtn { background: transparent; border: none; color: #e05555; font-size: 16px; padding: 2px 8px; cursor: pointer; }
  .sechead { color: var(--hint); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; margin: 16px 2px 8px; }
</style>
</head>
<body>
<nav class="tabs" id="tabs">
  <button data-tab="sessions" class="active">🖥 Sessions</button>
  <button data-tab="bus">🚌 Bus</button>
  <button data-tab="auto">⏱ Auto</button>
  <button data-tab="files">📁 Files</button>
  <button data-tab="settings">⚙️</button>
</nav>
<div class="err" id="err"></div>

<div class="tab show panel" id="tab-sessions"><div class="notice">Loading sessions…</div></div>
<div class="tab panel" id="tab-bus"></div>
<div class="tab panel" id="tab-auto"></div>

<div class="tab" id="tab-files">
  <header>
    <div class="crumbs" id="crumbs"></div>
    <div class="search">
      <input id="q" placeholder="find in this folder…" inputmode="search">
      <button id="go">Find</button>
    </div>
  </header>
  <ul id="list"></ul>
</div>
<input type="file" id="upload-input" multiple style="display:none">

<div class="tab panel" id="tab-settings"></div>

<div id="drill">
  <div class="vhead">
    <button id="dback">←</button>
    <span class="dot" id="ddot"></span>
    <span class="name" id="dname"></span>
    <button class="iconbtn" id="dstop" title="Interrupt">⏹</button>
    <button class="iconbtn" id="dcompact" title="Compact">🗜</button>
  </div>
  <div id="dfeed"></div>
  <div class="composer">
    <textarea id="dtext" rows="1" placeholder="Message this session…"></textarea>
    <button id="dsend">➤</button>
  </div>
</div>

<div id="viewer">
  <div class="vhead">
    <button id="vback">←</button>
    <span class="name" id="vname"></span>
    <button id="vedit" style="display:none">✏️</button>
    <button id="vsave" style="display:none">💾</button>
    <button id="vdl">⬇️</button>
    <button id="vclose">✕</button>
  </div>
  <pre id="vbody"></pre>
  <textarea id="vedit-area" style="display:none"></textarea>
  <div class="notice" id="vnotice" style="display:none"></div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const INIT = (tg && tg.initData) || "";
const AUTH = { Authorization: "tma " + INIT };

const $ = id => document.getElementById(id);
const errBox = $("err");
function showErr(m) { errBox.textContent = m; errBox.classList.add("show"); setTimeout(() => errBox.classList.remove("show"), 4000); }
function showOk(m) { errBox.textContent = m; errBox.classList.add("show", "ok"); setTimeout(() => errBox.classList.remove("show", "ok"), 2500); }

let WRITE = false;   // set from /api/ls (.write) — gates all edit/delete UI; mirrors WEBAPP_WRITE on the server

// POST a JSON write op with auth; surface server errors (incl. 409 edit conflicts). Returns parsed body or null.
async function writeOp(endpoint, body) {
  try {
    const r = await fetch(new URL(endpoint, location.origin), {
      method: "POST", headers: { ...AUTH, "content-type": "application/json" }, body: JSON.stringify(body),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) { showErr(d.reason || d.error || ("HTTP " + r.status)); return null; }
    return d;
  } catch { showErr("request failed"); return null; }
}

async function api(path, params) {
  const u = new URL(path, location.origin);
  for (const k in (params || {})) u.searchParams.set(k, params[k]);
  const r = await fetch(u, { headers: AUTH });
  if (!r.ok) { showErr("API " + r.status + (r.status === 401 ? " — open from Telegram" : r.status === 403 ? " — not authorized" : "")); throw new Error(r.status); }
  return r.json();
}

function fmtSize(n) { if (n < 1024) return n + "B"; if (n < 1048576) return (n / 1024).toFixed(0) + "KB"; return (n / 1048576).toFixed(1) + "MB"; }

let cur = new URLSearchParams(location.search).get("start") || "/";

function renderCrumbs(path) {
  const parts = path.split("/").filter(Boolean);
  let acc = "";
  const links = ['<a href="#" data-p="/">/</a>'];
  for (const p of parts) { acc += "/" + p; links.push('<a href="#" data-p="' + acc + '">' + p + '</a>'); }
  $("crumbs").innerHTML = links.join(" <span style=color:var(--hint)>›</span> ");
  $("crumbs").querySelectorAll("a").forEach(a => a.onclick = e => { e.preventDefault(); ls(a.dataset.p); });
}

async function ls(path) {
  let data;
  try { data = await api("/api/ls", { path }); } catch { return; }
  cur = data.path;
  WRITE = !!data.write;
  renderCrumbs(cur);
  const list = $("list");
  list.innerHTML = "";
  if (data.parent) list.appendChild(row("⬆️", "..", "", () => ls(data.parent)));
  if (WRITE) { list.appendChild(row("📤", "Upload file", "", pickUpload)); list.appendChild(row("➕", "New folder…", "", newFolder)); }
  for (const e of data.entries) {
    const ico = e.type === "dir" ? "📁" : e.type === "symlink" ? "🔗" : "📄";
    const meta = e.type === "dir" ? "" : fmtSize(e.size);
    const full = (cur === "/" ? "" : cur) + "/" + e.name;
    list.appendChild(row(ico, e.name, meta, e.type === "dir" ? () => ls(full) : () => openFile(full), { path: full, type: e.type }));
  }
}

function row(ico, name, meta, onclick, opts) {
  const li = document.createElement("li");
  li.innerHTML = '<span class="ico"></span><span class="name"></span><span class="meta"></span>';
  li.children[0].textContent = ico; li.children[1].textContent = name; li.children[2].textContent = meta;
  li.onclick = onclick;
  // Show the ⋯ menu for every file (Download is read-only-safe) and, when WRITE, for folders too.
  if (opts && opts.path && (opts.type === "file" || WRITE)) {
    const b = document.createElement("button");
    b.className = "rowbtn"; b.textContent = "⋯";
    b.onclick = e => { e.stopPropagation(); rowMenu(opts.path, opts.type); };
    li.appendChild(b);
  }
  return li;
}

let vPath = null, vMtime = 0, vEditable = false;

async function openFile(path) {
  let data;
  try { data = await api("/api/read", { path }); } catch { return; }
  $("vname").textContent = path.split("/").pop();
  const body = $("vbody"), notice = $("vnotice"), ta = $("vedit-area");
  vPath = path; vMtime = data.mtime || 0; vEditable = !data.binary && !data.tooLarge;
  $("vdl").onclick = () => download(path);
  ta.style.display = "none"; $("vsave").style.display = "none";          // reset to view state every open
  $("vedit").style.display = (WRITE && vEditable) ? "" : "none";
  if (data.binary || data.tooLarge) {
    body.style.display = "none"; notice.style.display = "block";
    notice.textContent = data.binary ? "Binary file — download to view." : "File too large to preview (" + fmtSize(data.size) + ") — download it.";
  } else {
    notice.style.display = "none"; body.style.display = "block";
    body.textContent = data.content;
  }
  $("viewer").classList.add("show");
}
$("vclose").onclick = () => $("viewer").classList.remove("show");
// Back: leave the viewer and land in the folder the file lives in (robust even after a search).
$("vback").onclick = () => { $("viewer").classList.remove("show"); ls(vPath ? (vPath.split("/").slice(0, -1).join("/") || "/") : cur); };

// Edit: swap the <pre> for an editable textarea; Save POSTs /api/write with the mtime we read, so the
// server 409s if the file changed underneath us. Edit/Save buttons only render when WRITE && text file.
$("vedit").onclick = () => {
  const ta = $("vedit-area");
  ta.value = $("vbody").textContent;
  $("vbody").style.display = "none"; ta.style.display = "block";
  $("vedit").style.display = "none"; $("vsave").style.display = "";
  ta.focus();
};
$("vsave").onclick = async () => {
  const ta = $("vedit-area");
  const d = await writeOp("/api/write", { path: vPath, content: ta.value, mtime: vMtime });
  if (!d) return;   // error (incl. conflict) already surfaced
  vMtime = d.mtime; $("vbody").textContent = ta.value;
  ta.style.display = "none"; $("vbody").style.display = "block";
  $("vsave").style.display = "none"; $("vedit").style.display = "";
  showOk("Saved");
};

// Per-row ⋯ menu (rename / delete-to-trash); native Telegram popups when available, prompt() otherwise.
function rowMenu(path, type) {
  const name = path.split("/").pop() || path;
  const buttons = [];
  if (type === "file") buttons.push({ id: "download", text: "Download" });
  if (WRITE) { buttons.push({ id: "rename", text: "Rename" }); buttons.push({ id: "delete", type: "destructive", text: "Delete" }); }
  if (buttons.length < 3) buttons.push({ id: "cancel", type: "cancel" });   // Telegram popups allow ≤3 buttons
  const act = id => {
    if (id === "download") download(path);
    else if (id === "rename") { const nn = prompt('Rename "' + name + '" to:', name); if (nn && nn !== name) writeOp("/api/rename", { path, newName: nn }).then(d => { if (d) { showOk("Renamed"); ls(cur); } }); }
    else if (id === "delete") confirmDelete(path, name);
  };
  if (tg && tg.showPopup) tg.showPopup({ title: name, message: "File actions", buttons }, act);
  else {
    const keys = [type === "file" ? "S to save" : null, WRITE ? "R to rename" : null, WRITE ? "D to delete" : null].filter(Boolean).join(", ");
    const c = prompt('"' + name + '" — type ' + keys);
    if (c === "S" || c === "s") act("download"); else if (c === "R" || c === "r") act("rename"); else if (c === "D" || c === "d") act("delete");
  }
}
function confirmDelete(path, name) {
  const go = () => writeOp("/api/rm", { path }).then(d => { if (d) { showOk("Moved to trash"); ls(cur); } });
  if (tg && tg.showConfirm) tg.showConfirm('Move "' + name + '" to trash?', ok => { if (ok) go(); });
  else if (confirm('Move "' + name + '" to trash?')) go();
}
async function newFolder() {
  const n = prompt("New folder name:");
  if (!n) return;
  const d = await writeOp("/api/mkdir", { path: cur, name: n });
  if (d) { showOk("Folder created"); ls(cur); }
}
// Upload from device: a hidden <input type=file> opens the native picker; each chosen file is POSTed
// as multipart to /api/upload (into the folder open when picked), then the folder refreshes. Collisions
// auto-dedup server-side, so re-uploading never clobbers. FormData sets its own content-type → AUTH only.
const uploadInput = $("upload-input");
function pickUpload() { uploadInput.value = ""; uploadInput.click(); }
uploadInput.onchange = async () => {
  const files = [...uploadInput.files];
  if (!files.length) return;
  const dir = cur;   // capture now — the user could navigate before uploads finish
  let okN = 0;
  for (const f of files) {
    const fd = new FormData();
    fd.append("dir", dir); fd.append("file", f, f.name);
    try {
      const r = await fetch(new URL("/api/upload", location.origin), { method: "POST", headers: AUTH, body: fd });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) { showErr((f.name) + ": " + (d.reason || d.error || ("HTTP " + r.status))); continue; }
      okN++;
    } catch { showErr("upload failed: " + f.name); }
  }
  if (okN) { showOk("Uploaded " + okN + " file" + (okN === 1 ? "" : "s")); if (cur === dir) ls(dir); }
};

// Mint a short-lived download token (authed) so a header-less fetch — Telegram's native saver or the
// external browser — can pull the file. Returns the token, or null on failure.
async function dlToken(path) {
  try {
    const r = await fetch(new URL("/api/dl-token", location.origin), {
      method: "POST", headers: { ...AUTH, "content-type": "application/json" }, body: JSON.stringify({ path }),
    });
    const d = await r.json().catch(() => ({}));
    return r.ok ? d.token : null;
  } catch { return null; }
}

// Save a file to the device. Prefer Telegram's native "Save to Files" dialog (downloadFile, Bot API
// 8.0+); else open the tokenized URL in the external browser (it downloads via Content-Disposition);
// else (plain browser / dev) fetch with auth and click a blob <a download>. The first two fetch the URL
// without our header, so they go through a token; the blob path stays header-authed.
async function download(path) {
  const name = path.split("/").pop();
  const canNative = tg && tg.isVersionAtLeast && tg.isVersionAtLeast("8.0") && tg.downloadFile;
  const canOpen = tg && tg.openLink;
  if (canNative || canOpen) {
    const tok = await dlToken(path);
    if (tok) {
      const u = new URL("/api/download", location.origin);
      u.searchParams.set("path", path); u.searchParams.set("t", tok);
      const abs = u.toString();
      if (canNative) { tg.downloadFile({ url: abs, file_name: name }); return; }
      tg.openLink(abs); return;
    }
    // token mint failed — fall through to the blob path
  }
  try {
    const r = await fetch(new URL("/api/download?path=" + encodeURIComponent(path), location.origin), { headers: AUTH });
    if (!r.ok) { showErr("download " + r.status); return; }
    const blob = await r.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch { showErr("download failed"); }
}

async function find() {
  const q = $("q").value.trim();
  if (!q) return ls(cur);
  let data;
  try { data = await api("/api/find", { root: cur, q }); } catch { return; }
  renderCrumbs(cur);
  const list = $("list"); list.innerHTML = "";
  list.appendChild(row("🔍", q + " — " + data.matches.length + (data.capped ? "+" : "") + " match(es)", "", () => ls(cur)));
  for (const m of data.matches) list.appendChild(row("📄", m.replace(cur === "/" ? "" : cur, "") || m, "", () => openFile(m)));
}
$("go").onclick = find;
$("q").addEventListener("keydown", e => { if (e.key === "Enter") find(); });

// ---- Tabs (Sessions / Bus / Auto / Files / Settings) ----
// Sessions is the homepage. Live tabs (sessions/bus) refresh on an interval while visible; the
// interval is torn down on every tab switch and paused when Telegram backgrounds the webview.
let curTab = "sessions";
let tabTimer = null;
let filesLoaded = false;
function setLive(fn, ms) {
  clearInterval(tabTimer);
  tabTimer = setInterval(() => { if (!document.hidden && !$("drill").classList.contains("show")) fn(); }, ms);
}
async function showTab(name) {
  curTab = name;
  clearInterval(tabTimer);
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("show", t.id === "tab-" + name));
  if (name === "sessions") { renderSessions(); setLive(renderSessions, 4000); }
  else if (name === "bus") { renderBus(); setLive(renderBus, 5000); }
  else if (name === "auto") renderAuto();
  else if (name === "files") { if (!filesLoaded) { filesLoaded = true; ls(cur); } }
  else if (name === "settings") renderSettings();
}
document.querySelectorAll("#tabs button").forEach(b => b.onclick = () => showTab(b.dataset.tab));

const esc = s => String(s == null ? "" : s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

// Settings: live values + (when write enabled) toggles/selects that POST then refresh in place.
async function renderSettings() {
  const el = $("tab-settings");
  let d; try { d = await api("/api/settings"); } catch { el.innerHTML = '<div class="notice">Settings unavailable.</div>'; return; }
  const W = !!d.write;
  const meta = {
    voice: { name: "🔊 Voice replies", bool: true },
    mcp: { name: "🔌 MCP mode", bool: true },
    sessionPin: { name: "📌 Pinned card", bool: true },
    stream: { name: "💬 Stream", bool: false },
    mode: { name: "🛠️ Mode", bool: false },
    model: { name: "🤖 Model", bool: false },
    effort: { name: "⚡ Effort", bool: false },
  };
  el.innerHTML = "";
  const head = document.createElement("div");
  head.className = "card"; head.innerHTML = '<div class="k">Channel</div><div class="v">' + (W ? "Editing enabled" : "Read-only — set TELEGRAM_WEBAPP_WRITE=1 to change") + "</div>";
  el.appendChild(head);
  const wrap = document.createElement("div"); wrap.className = "card";
  for (const key in meta) {
    const m = meta[key], s = d.settings[key]; if (!s) continue;
    const editable = W && s.editable;
    const r = document.createElement("div"); r.className = "setrow";
    const lbl = document.createElement("div"); lbl.className = "lbl";
    lbl.innerHTML = '<div>' + m.name + '</div>' + (s.label ? '<div class="sub">' + esc(s.label) + '</div>' : "");
    r.appendChild(lbl);
    if (m.bool) {
      const on = !!s.value;
      const btn = document.createElement("button");
      btn.className = "toggle" + (on ? "" : " off"); btn.textContent = on ? "On" : "Off";
      if (editable) btn.onclick = () => setSetting(key, !on); else btn.disabled = true;
      r.appendChild(btn);
    } else if (s.options && editable) {
      const sel = document.createElement("select"); sel.className = "seg";
      for (const o of s.options) { const op = document.createElement("option"); op.value = o; op.textContent = o; if (o === s.value) op.selected = true; sel.appendChild(op); }
      sel.onchange = () => setSetting(key, sel.value);
      r.appendChild(sel);
    } else {
      const ro = document.createElement("div"); ro.className = "ro"; ro.textContent = s.value == null ? "—" : String(s.value);
      r.appendChild(ro);
    }
    wrap.appendChild(r);
  }
  el.appendChild(wrap);
}
async function setSetting(key, value) {
  const d = await writeOp("/api/settings/set", { key, value });
  if (d) { showOk("Updated"); renderSettings(); }
}

// ---- Sessions dashboard (homepage): one card per session, tap → drill-in ----
const pctBar = p => p == null ? "" : '<div class="bar"><span style="width:' + Math.max(0, Math.min(100, p)) + '%"></span></div>';
let SESSIONS = [];
async function renderSessions() {
  const el = $("tab-sessions");
  let d; try { d = await api("/api/sessions"); } catch { if (!SESSIONS.length) el.innerHTML = '<div class="notice">Sessions unavailable.</div>'; return; }
  SESSIONS = d.sessions || [];
  if (!SESSIONS.length) { el.innerHTML = '<div class="notice">No live sessions.</div>'; return; }
  el.innerHTML = "";
  for (const s of SESSIONS) {
    const c = document.createElement("div");
    c.className = "sess";
    const dot = !s.alive ? "dead" : s.working ? "on" : "";
    const chips = [];
    if (s.model) chips.push(esc(s.model) + (s.effort ? " ⚡" + esc(s.effort === "medium" ? "med" : s.effort) : ""));
    if (s.mode && s.mode !== "default") chips.push(esc(s.mode === "bypassPermissions" ? "bypass" : s.mode));
    if (s.agent && s.agent !== "claude") chips.push(esc(s.agent));
    c.innerHTML =
      '<div class="top"><span class="dot ' + dot + '"></span><span class="nm">' + esc(s.name) + '</span>' +
      chips.map(x => '<span class="chip">' + x + "</span>").join("") + "</div>" +
      (s.task ? '<div class="task">' + (s.working ? "⏳ " : "💬 ") + esc(s.task) + "</div>" : "") +
      (!s.alive ? '<div class="task">💀 no live pane</div>' : "") +
      '<div class="foot">' +
        (s.branch ? "<span>🌿 " + esc(s.branch) + "</span>" : "") +
        (s.ctxPct != null ? "<span>ctx " + s.ctxPct + "%</span>" + pctBar(s.ctxPct) : "") +
        (s.h5Pct != null ? "<span>5h " + s.h5Pct + "%</span>" : "") +
      "</div>";
    if (s.alive) c.onclick = () => openDrill(s.sid, s.name);
    el.appendChild(c);
  }
}

// ---- Drill-in: conversation feed + composer + stop/compact ----
let drillSid = null, drillTimer = null, lastDrill = null, optimistic = [];
function openDrill(sid, name) {
  drillSid = sid; lastDrill = null; optimistic = [];
  $("dname").textContent = name;
  $("dfeed").innerHTML = '<div class="notice">Loading…</div>';
  $("drill").classList.add("show");
  renderDrill();
  clearInterval(drillTimer);
  drillTimer = setInterval(() => { if (!document.hidden) renderDrill(); }, 3000);
}
function closeDrill() { $("drill").classList.remove("show"); clearInterval(drillTimer); drillSid = null; renderSessions(); }
$("dback").onclick = closeDrill;
// Paint the feed from the last server snapshot + any optimistic (locally-sent, not-yet-echoed)
// bubbles. An optimistic bubble is dropped once the transcript echoes the same user text (or
// after 2min as a safety valve, so a paraphrased echo can't leave a ghost forever).
function paintFeed() {
  const feed = $("dfeed");
  const stuck = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;   // keep pinned to bottom unless the user scrolled up
  const items = lastDrill ? lastDrill.items : [];
  optimistic = optimistic.filter(o => !items.some(i => i.role === "user" && i.text.trim() === o.text) && Date.now() - o.at < 120000);
  const rows = items.map(i => '<div class="msg ' + i.role + '">' + esc(i.text) + "</div>")
    .concat(optimistic.map(o => '<div class="msg user' + (o.state === "pending" ? " pending" : "") + '">' + esc(o.text) + "</div>"));
  feed.innerHTML = rows.length ? rows.join("") : '<div class="notice">No conversation yet.</div>';
  if (stuck) feed.scrollTop = feed.scrollHeight;
}
async function renderDrill() {
  if (!drillSid) return;
  let d; try { d = await api("/api/session/feed", { sid: drillSid }); } catch { return; }
  $("ddot").className = "dot " + (d.working ? "on" : "");
  lastDrill = d;
  paintFeed();
}
async function sessionAct(action, text) {
  const d = await writeOp("/api/session/act", { sid: drillSid, action, ...(text ? { text } : {}) });
  return !!d;
}
$("dstop").onclick = async () => { if (await sessionAct("stop")) showOk("Interrupted"); };
$("dcompact").onclick = async () => { if (await sessionAct("compact")) showOk("Compacting…"); };
$("dsend").onclick = async () => {
  const ta = $("dtext"), text = ta.value.trim();
  if (!text) return;
  ta.value = "";
  // Optimistic: the bubble shows the instant you hit send (dimmed while in flight), instead of
  // waiting for the POST + transcript echo + poll round-trip.
  const o = { text, at: Date.now(), state: "pending" };
  optimistic.push(o);
  paintFeed();
  $("dfeed").scrollTop = $("dfeed").scrollHeight;   // sending always reveals your own message
  if (await sessionAct("send", text)) { o.state = "sent"; paintFeed(); setTimeout(renderDrill, 800); }
  else { optimistic = optimistic.filter(x => x !== o); paintFeed(); ta.value = text; }   // failed — give the draft back
};

// ---- Agent-bus board: live agents, open asks, recent events ----
const EV_GLYPH = { ask: "→", answer: "✓", post: "📣", expire: "⌛", slash: "/", spawn: "🚀", pause: "⏸" };
const fmtAge = s => s < 90 ? s + "s" : s < 5400 ? Math.round(s / 60) + "m" : Math.round(s / 3600) + "h";
async function renderBus() {
  const el = $("tab-bus");
  let d; try { d = await api("/api/bus"); } catch { el.innerHTML = '<div class="notice">Bus unavailable.</div>'; return; }
  if (!d.agents.length && !d.events.length) { el.innerHTML = '<div class="notice">No agent bus — bind a forum group first.</div>'; return; }
  let html = '<div class="buschips">' + d.agents.map(a =>
    '<span class="chip">' + (a.live ? "🟢" : "⚪") + " " + esc(a.name) + (a.kind === "hermes" ? " ✨" : "") + "</span>").join("") + "</div>";
  if (d.pending.length) {
    html += '<div class="sechead">Open asks</div>';
    for (const p of d.pending) html +=
      '<div class="evrow"><span class="who">' + esc(p.from) + "→" + esc(p.to) + " #" + p.id + "</span>" +
      '<span class="tx">' + esc(p.text) + "</span><span>" + (p.delivered ? "" : "⏳ ") + fmtAge(p.ageSec) + "</span></div>";
  }
  html += '<div class="sechead">Recent</div>';
  html += d.events.length ? d.events.map(e =>
    '<div class="evrow"><span>' + (EV_GLYPH[e.kind] || "·") + '</span><span class="who">' + esc(e.from) + (e.to ? "→" + esc(e.to) : "") + (e.id != null ? " #" + e.id : "") + "</span>" +
    '<span class="tx">' + esc(e.text) + "</span></div>").join("")
    : '<div class="notice">No bus traffic yet.</div>';
  el.innerHTML = html;
}

// ---- Automation board: cron + queued prompts + budget, each cancellable ----
async function renderAuto() {
  const el = $("tab-auto");
  let d; try { d = await api("/api/auto"); } catch { el.innerHTML = '<div class="notice">Automation unavailable.</div>'; return; }
  let html = "";
  html += '<div class="sechead">Scheduled (/cron)</div>';
  html += d.cron.length ? d.cron.map(m =>
    '<div class="evrow"><span class="who">' + (m.recurLabel ? "🔁 " + esc(m.recurLabel) : new Date(m.fireAt).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })) + "</span>" +
    '<span class="tx">' + esc(m.sessionLabel) + ": " + esc(m.text) + "</span>" +
    '<button class="xbtn" data-kind="cron" data-id="' + esc(m.id) + '">✕</button></div>').join("")
    : '<div class="notice">Nothing scheduled.</div>';
  html += '<div class="sechead">Queued (/queue)</div>';
  html += d.queue.length ? d.queue.map(q =>
    '<div class="evrow"><span class="who">' + esc(q.session) + '</span><span class="tx">' + esc(q.text) + "</span>" +
    '<button class="xbtn" data-kind="queue" data-id="' + esc(q.id) + '">✕</button></div>').join("")
    : '<div class="notice">Queue is empty.</div>';
  if (d.budget && (d.budget.cap || d.budget.spent)) {
    html += '<div class="sechead">Budget today</div><div class="card"><div class="v">$' + d.budget.spent.toFixed(2) +
      (d.budget.cap ? " of $" + d.budget.cap.toFixed(2) : " · no cap") + "</div>" +
      (d.budget.cap ? pctBar((d.budget.spent / d.budget.cap) * 100) : "") + "</div>";
  }
  el.innerHTML = html;
  el.querySelectorAll(".xbtn").forEach(b => b.onclick = async () => {
    const d2 = await writeOp("/api/auto/cancel", { kind: b.dataset.kind, id: b.dataset.id });
    if (d2) { showOk("Cancelled"); renderAuto(); }
  });
}

// Boot: Sessions is the homepage. A deep link (?start= folder, or startapp token → /api/resolve)
// still lands on Files at that folder — that's what the /files command promises.
async function boot() {
  const sp = tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param;
  const qs = new URLSearchParams(location.search).get("start");
  if (sp) {
    try { const r = await api("/api/resolve", { token: sp }); cur = r.cwd || "/"; filesLoaded = true; ls(cur); showTab("files"); return; } catch {}
  } else if (qs) { filesLoaded = true; ls(cur); showTab("files"); return; }
  showTab("sessions");
}
if (!INIT) $("tab-sessions").innerHTML = '<div class="notice">Open this from the Telegram button — it carries the sign-in token.</div>';
else boot();
</script>
